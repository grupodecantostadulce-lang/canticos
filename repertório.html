<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cifrador Pro - Repertório Profissional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; height: 100vh; margin: 0; overflow: hidden; }
        
        .sidebar { width: 340px; background: #2c3e50; color: white; padding: 15px; display: flex; flex-direction: column; flex-shrink: 0; overflow-y: auto; border-right: 5px solid #1a252f; }
        .sidebar h2 { font-size: 1.1rem; margin-top: 20px; border-bottom: 1px solid #34495e; padding-bottom: 5px; color: #3498db; }
        
        .agenda-container { background: #34495e; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
        .input-data { width: 100%; padding: 8px; border-radius: 4px; border: none; margin-bottom: 8px; font-weight: bold; box-sizing: border-box; }
        #dia-semana-display { font-size: 0.9rem; color: #f1c40f; font-weight: bold; margin-bottom: 10px; display: block; text-align: center; }

        .musica-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #34495e; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .musica-item:hover { background: #1a252f; }
        
        #lista-repertorio { background: #1a252f; border-radius: 5px; min-height: 50px; padding: 5px; margin-top: 5px; }
        
        .repertorio-item { 
            padding: 8px; font-size: 13px; display: flex; justify-content: space-between; 
            background: #2c3e50; margin-bottom: 5px; border-left: 3px solid #27ae60; 
            align-items: center; border-radius: 4px; cursor: grab; transition: transform 0.1s, background 0.2s;
            user-select: none;
        }
        .repertorio-item:active { cursor: grabbing; }
        .repertorio-item.dragging { opacity: 0.5; background: #34495e; transform: scale(0.95); }
        .repertorio-item.drag-over { border-top: 2px solid #3498db; }

        .controles-ordem { display: flex; gap: 4px; align-items: center; }
        .btn-ordem { background: #1a252f; color: white; border: 1px solid #555; border-radius: 3px; cursor: pointer; padding: 2px 6px; font-size: 11px; }

        .main-content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 950px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }

        .header-flex { display: flex; justify-content: space-between; align-items: flex-start; gap: 25px; border-bottom: 2px solid #f0f2f5; padding-bottom: 20px; margin-bottom: 20px; }
        #player-embed-container { width: 320px; height: 180px; background: #000; border-radius: 8px; overflow: hidden; display: none; flex-shrink: 0; }

        #visor-cifra { white-space: pre; font-family: 'Consolas', 'Monaco', 'Courier New', monospace; font-size: 16px; line-height: 1.5; color: #000; }
        .acorde { color: #e74c3c; font-weight: bold; background: #fdf2f2; border-radius: 3px; padding: 0 2px; }

        .btn-add { background: #27ae60; color: white; width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-pdf { background: #c0392b; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-tom { background: #34495e; color: white; padding: 8px 15px; border: none; border-radius: 5px; cursor: pointer; margin-right: 5px; }
        
        #modal-cadastro { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:200; }
        .modal-content { background:white; padding:25px; border-radius:10px; width:750px; display:flex; flex-direction:column; gap:10px; }

        .busca-wrapper { position: relative; margin-bottom: 8px; }
        #busca-input { width: 100%; padding: 8px 34px 8px 32px; border-radius: 6px; border: none; background: #1a252f; color: #ecf0f1; font-size: 13px; box-sizing: border-box; outline: none; }
        #busca-limpar { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #7f8c8d; cursor: pointer; display: none; }
        
        .badge-data { background: #3498db; color: white; padding: 5px 10px; border-radius: 15px; font-size: 11px; margin: 3px; display: inline-block; cursor: pointer; border: none; transition: 0.3s; }
        .badge-data:hover { background: #2980b9; transform: scale(1.05); }
        #container-datas-salvas { margin-top: 10px; padding-top: 10px; border-top: 1px solid #455a64; }
    </style>
</head>
<body>

<div class="sidebar">
    <button class="btn-add" onclick="abrirModal()">+ Novo Cântico</button>
    
    <h2>📅 Agenda do Repertório</h2>
    <div class="agenda-container">
        <input type="date" id="data-selecionada" class="input-data" onchange="atualizarDataDisplay(); atualizarDestaquesCalendario();">
        <span id="dia-semana-display">Selecione uma data</span>

        <div id="container-datas-salvas">
            <small style="color: #bdc3c7; display: block; margin-bottom: 5px;">Dias com Repertório:</small>
            <div id="lista-datas-destaque"></div>
        </div>
        
        <div id="lista-repertorio"></div>
        
        <button class="btn-pdf" onclick="gerarPDF()">⬇ Exportar PDF com Cifras</button>
        <button class="btn-pdf" style="background:#8e44ad; margin-top:6px;" onclick="gerarPDFLetras()">⬇ Exportar Letras (.docx)</button>
        <button class="btn-pdf" style="background:#16a085; margin-top:6px;" onclick="gerarListaLinks()">📋 Exportar Lista com Links</button>
        <button class="btn-add" style="background:#2980b9; margin-top:15px;" onclick="salvarAgenda()">💾 Salvar Agenda</button>
    </div>

    <h2>📚 Minha Biblioteca</h2>
    <div class="busca-wrapper">
        <span style="position:absolute; left:9px; top:8px; color:#7f8c8d;">🔍</span>
        <input type="text" id="busca-input" placeholder="Buscar cântico..." oninput="filtrarMusicas()">
        <button id="busca-limpar" onclick="limparBusca()">✕</button>
    </div>
    <div id="lista-musicas"></div>
</div>

<div class="main-content">
    <div class="container">
        <div class="header-flex">
            <div style="flex: 1; text-align: left;">
                <h1 id="titulo-musica" style="margin: 0; color: #2c3e50;">Inicie seu Repertório</h1>
                <div class="controles" id="controles-transposicao" style="margin-top: 25px;">
                    <button class="btn-tom" onclick="transpor(-1)">- Tom</button>
                    <button class="btn-tom" onclick="transpor(1)">+ Tom</button>
                    <button class="btn-tom" style="background:#27ae60" onclick="adicionarAoRepertorio()">+ Add ao Repertório</button>
                    <button class="btn-tom" style="background:#f39c12; margin-top:8px;" onclick="editarCanticoAtual()">✎ Editar Cântico</button>
                </div>
            </div>
            <div id="player-embed-container"></div>
        </div>
        <div id="visor-cifra">Selecione um cântico ao lado.</div>
    </div>
</div>

<div id="modal-cadastro">
    <div class="modal-content">
        <h3 id="modal-titulo-label">Dados do Cântico</h3>
        <input type="hidden" id="edit-id">
        <input type="text" id="novo-titulo" placeholder="Nome da Música">
        <input type="text" id="novo-link" placeholder="Link do YouTube">
        <textarea id="novo-texto" style="height:300px; font-family:monospace" placeholder="Cifra ou letra..."></textarea>
        <div style="display: flex; gap: 10px; justify-content: flex-end;">
            <button onclick="fecharModal()" style="background:#95a5a6; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">Cancelar</button>
            <button onclick="salvar()" style="background:#27ae60; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer; font-weight:bold;">Salvar</button>
        </div>
    </div>
</div>

<script src="docx.min.js"></script>
<script src="FileSaver.min.js"></script>

<script>
    const escala = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    let db = JSON.parse(localStorage.getItem('cifras_v7')) || {};
    let agendas = JSON.parse(localStorage.getItem('agendas_v7')) || {};
    let repertorioAtual = [];
    let dragIndex = null;

    // ── DATA E REPERTÓRIO ─────────────────────────────────────────
    function atualizarDataDisplay() {
        const dataVal = document.getElementById('data-selecionada').value;
        if (!dataVal) return;
        const dataObj = new Date(dataVal + 'T12:00:00');
        document.getElementById('dia-semana-display').innerText = dataObj.toLocaleDateString('pt-BR', { weekday: 'long', year: 'numeric', month: '2-digit', day: '2-digit' });
        repertorioAtual = agendas[dataVal] || [];
        atualizarListaRepertorioUI();
    }

    function adicionarAoRepertorio() {
        const nome = document.getElementById('titulo-musica').innerText;
        if (nome === "Inicie seu Repertório") return;
        const htmlCifra = document.getElementById('visor-cifra').innerHTML;
        repertorioAtual.push({ nome, htmlCifra });
        atualizarListaRepertorioUI();
    }

    function atualizarListaRepertorioUI() {
        const lista = document.getElementById('lista-repertorio');
        lista.innerHTML = '';
        repertorioAtual.forEach((m, i) => {
            const item = document.createElement('div');
            item.className = 'repertorio-item';
            item.draggable = true;
            item.dataset.index = i;
            item.innerHTML = `
                <span style="flex:1;">${i+1}. ${m.nome}</span>
                <div class="controles-ordem">
                    <button class="btn-ordem" onclick="moverCanto(${i}, -1)">▲</button>
                    <button class="btn-ordem" onclick="moverCanto(${i}, 1)">▼</button>
                    <button onclick="removerDoRepertorio(${i})" style="background:none; border:none; color:#ff7675; cursor:pointer; margin-left:5px;">✕</button>
                </div>
            `;
            item.addEventListener('dragstart', () => { dragIndex = i; item.classList.add('dragging'); });
            item.addEventListener('dragend', () => {
                item.classList.remove('dragging');
                dragIndex = null;
                document.querySelectorAll('.repertorio-item').forEach(el => el.classList.remove('drag-over'));
            });
            item.addEventListener('dragover', (e) => { e.preventDefault(); item.classList.add('drag-over'); });
            item.addEventListener('dragleave', () => { item.classList.remove('drag-over'); });
            item.addEventListener('drop', (e) => {
                e.preventDefault();
                if (dragIndex !== null && dragIndex !== i) {
                    const movedItem = repertorioAtual.splice(dragIndex, 1)[0];
                    repertorioAtual.splice(i, 0, movedItem);
                    atualizarListaRepertorioUI();
                }
            });
            lista.appendChild(item);
        });
    }

    function moverCanto(index, direcao) {
        const novoIndex = index + direcao;
        if (novoIndex >= 0 && novoIndex < repertorioAtual.length) {
            const temp = repertorioAtual[index];
            repertorioAtual[index] = repertorioAtual[novoIndex];
            repertorioAtual[novoIndex] = temp;
            atualizarListaRepertorioUI();
        }
    }

    function removerDoRepertorio(i) {
        repertorioAtual.splice(i, 1);
        atualizarListaRepertorioUI();
    }

    function salvarAgenda() {
        const dataVal = document.getElementById('data-selecionada').value;
        if (!dataVal) return alert("Selecione uma data!");
        agendas[dataVal] = repertorioAtual;
        localStorage.setItem('agendas_v7', JSON.stringify(agendas));
        alert("Agenda salva!");
    }

    function extrairSomenteLetra(htmlCifra) {
        const temp = document.createElement('div');
        temp.innerHTML = htmlCifra;
        const linhas = temp.innerText.split('\n');
        const acorPattern = /^\s*([A-G][#b]?(m|maj|dim|aug|sus|add|7|9|11|13|\/[A-G][#b]?)*\s*)+\s*$/;
        return linhas.filter(l => l.trim() !== '' && !acorPattern.test(l)).join('\n');
    }

    // ── EXIBIR CÂNTICO COM NOVA LÓGICA DE DETECÇÃO DE ACORDES ────
    function exibir(nome) {
        const tituloElemento = document.getElementById('titulo-musica');
        const playerContainer = document.getElementById('player-embed-container');
        const visor = document.getElementById('visor-cifra');
        tituloElemento.innerText = nome;
        const m = db[nome];

        // Player YouTube
        const regExp = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/i;
        const ytMatch = (m.link || '').match(regExp);
        if (ytMatch) {
            playerContainer.style.display = 'block';
            playerContainer.innerHTML = `<iframe width="320" height="180" src="https://www.youtube.com/embed/${ytMatch[1]}" frameborder="0" allowfullscreen></iframe>`;
        } else {
            playerContainer.style.display = 'none';
        }

        // Regex de acorde — deve ser recriado a cada uso pois tem flag /g
        function reAcorde() {
            return /\b([A-G][#b]?(m|maj|dim|aug|sus|add|7|9|11|13|\/[A-G][#b]?)*)(?=\s|$)/g;
        }

        // Uma linha é de acordes se, removendo todos os acordes, sobrar apenas espaços
        function ehLinhaDeAcordes(linha) {
            if (!linha.trim()) return false;
            const semAcordes = linha.replace(reAcorde(), '').replace(/\s/g, '');
            return semAcordes === '' && reAcorde().test(linha);
        }

        const linhasHtml = m.texto.split('\n').map(l => {
            if (ehLinhaDeAcordes(l)) {
                return l.replace(reAcorde(), '<span class="acorde">$1</span>');
            }
            return l;
        });

        visor.innerHTML = linhasHtml.join('\n');
    }

    // ── EXPORTAR PDF COM CIFRAS ───────────────────────────────────
    // ── EXPORTAR PDF COM CIFRAS ───────────────────────────────────
    function gerarPDF() {
        const dataVal = document.getElementById('data-selecionada').value;
        if (repertorioAtual.length === 0) return alert("Adicione cânticos!");
        const displayData = document.getElementById('dia-semana-display').innerText;

        const elementoPdf = document.createElement('div');
        elementoPdf.style.cssText = 'padding: 0; font-family: "Courier New", Courier, monospace; background: white; color: #000;';

        let htmlGeral = `
            <div style="text-align:center; border-bottom:1.5px solid #000; margin-bottom:10px; padding-bottom:5px; font-family: Arial;">
                <h1 style="margin:0; font-size:14pt; text-transform:uppercase;">Repertório de Cifras</h1>
                <p style="margin:2px 0; font-size:11pt; color:#444;">${displayData}</p>
            </div>
        `;

        repertorioAtual.forEach((m, index) => {
            const linkAudio = db[m.nome]?.link || "";
            
            // Tratamos o conteúdo separando por linhas para criar blocos indestrutíveis
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = m.htmlCifra;
            const linhas = tempDiv.innerHTML.split('\n');
            
            let conteudoAgrupado = "";
            
            // Regex para identificar se a linha contém as tags de acorde que você inseriu
            const temAcorde = /<span class="acorde">|<b style="color:#e74c3c;">/;

            for (let i = 0; i < linhas.length; i++) {
                // Se a linha atual for de acordes e a próxima for de texto, agrupamos as duas
                if (temAcorde.test(linhas[i]) && i + 1 < linhas.length && !temAcorde.test(linhas[i+1])) {
                    conteudoAgrupado += `
                        <div style="page-break-inside: avoid; break-inside: avoid; display: block;">
                            ${linhas[i]}
                            ${linhas[i+1]}
                        </div>
                    `;
                    i++; // Pula a próxima linha já que foi inclusa no bloco
                } else {
                    // Linhas isoladas (como quebras de estrofe vazias ou blocos só de texto/só de acordes)
                    conteudoAgrupado += `
                        <div style="page-break-inside: avoid; break-inside: avoid; display: block;">
                            ${linhas[i] || '&nbsp;'}
                        </div>
                    `;
                }
            }

            // Aplicamos a estilização das tags de negrito e cor vermelha nas cifras
            conteudoAgrupado = conteudoAgrupado.replace(/<span class="acorde">(.*?)<\/span>/g, '<b style="color:#e74c3c;">$1</b>');

            htmlGeral += `
                <div style="page-break-after: always; padding: 3mm 10mm 10mm 10mm; box-sizing: border-box;">
                    <h2 style="font-family: Arial; margin: 0 0 3px 0; font-size: 13pt;">${index + 1}. ${m.nome}</h2>
                    ${linkAudio ? `<div style="margin-bottom: 5px; font-family: Arial; font-size: 9pt;">
                        <a href="${linkAudio}" target="_blank" style="color:#c0392b; text-decoration:underline; font-weight:bold;">Ouvir no YouTube</a>
                    </div>` : ''}
                    <div style="
                        border-top: 1px solid #000;
                        padding-top: 6px;
                        column-count: 2;
                        column-gap: 8mm;
                        column-fill: auto;
                        height: 255mm;
                        white-space: pre;
                        word-break: keep-all;
                        font-family: 'Courier New', monospace;
                        font-size: 13pt;
                        line-height: 1.4;
                        overflow: hidden;
                    ">${conteudoAgrupado}</div>
                </div>`;
        });

        elementoPdf.innerHTML = htmlGeral;
        html2pdf().set({
            margin: 0,
            filename: `${dataVal}-Canticos-cifrados.pdf`,
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4' }
        }).from(elementoPdf).save();
    }

    // ── EXPORTAR DOCX SÓ LETRAS ───────────────────────────────────
    async function gerarPDFLetras() {
        const dataVal = document.getElementById('data-selecionada').value;
        if (repertorioAtual.length === 0) return alert("Adicione cânticos ao repertório!");
        const displayData = document.getElementById('dia-semana-display').innerText;

        if (typeof docx === 'undefined') {
            return alert("Biblioteca docx.js não carregou. Verifique se os arquivos docx.min.js e FileSaver.min.js estão na mesma pasta do HTML.");
        }

        const { Document, Packer, Paragraph, TextRun,
                AlignmentType, BorderStyle, SectionType } = docx;

        const paragraphs = [];

        paragraphs.push(
            new Paragraph({
                alignment: AlignmentType.CENTER,
                border: { bottom: { style: BorderStyle.SINGLE, size: 12, color: "000000", space: 4 } },
                spacing: { before: 0, after: 140 },
                children: [
                    new TextRun({ text: "REPERTÓRIO DE CANTOS", bold: true, size: 28, font: "Arial" })
                ]
            }),
            new Paragraph({
                alignment: AlignmentType.CENTER,
                spacing: { before: 0, after: 280 },
                children: [
                    new TextRun({ text: displayData.toUpperCase(), size: 22, font: "Arial", color: "444444" })
                ]
            })
        );

        repertorioAtual.forEach((m, index) => {

            function extrairLetraComQuebras(htmlCifra) {
                const temp = document.createElement('div');
                temp.innerHTML = htmlCifra
                    .replace(/<br\s*\/?>/gi, '\n')
                    .replace(/<\/div>\s*<div/gi, '\n<div')
                    .replace(/<\/p>\s*<p/gi, '\n<p');

                function percorrerNos(no) {
                    let resultado = '';
                    no.childNodes.forEach(filho => {
                        if (filho.nodeType === Node.TEXT_NODE) {
                            resultado += filho.textContent;
                        } else if (filho.nodeName === 'BR') {
                            resultado += '\n';
                        } else if (['DIV','P','LI'].includes(filho.nodeName)) {
                            const conteudo = percorrerNos(filho);
                            resultado += (resultado && !resultado.endsWith('\n') ? '\n' : '') + conteudo;
                        } else {
                            resultado += percorrerNos(filho);
                        }
                    });
                    return resultado;
                }

                const textoCompleto = percorrerNos(temp);
                const acordePattern = /^\s*([A-G][#b]?(m|maj|dim|aug|sus|add|7|9|11|13|\/[A-G][#b]?)*\s*)+\s*$/;
                return textoCompleto.split('\n').filter(l => !acordePattern.test(l)).join('\n');
            }

            const letra = extrairLetraComQuebras(m.htmlCifra).toUpperCase();
            const linhas = letra.split('\n');

            paragraphs.push(
                new Paragraph({
                    spacing: { before: 200, after: 60 },
                    border: { bottom: { style: BorderStyle.SINGLE, size: 6, color: "000000", space: 2 } },
                    children: [
                        new TextRun({ text: `${index + 1}. ${m.nome.toUpperCase()}`, bold: true, size: 24, font: "Arial" })
                    ]
                })
            );

            let emRefrao = false;

            linhas.forEach((linha) => {
                const linhaLimpa = linha.trim();

                if (linhaLimpa === '') {
                    emRefrao = false;
                    paragraphs.push(
                        new Paragraph({
                            spacing: { before: 0, after: 100 },
                            children: [new TextRun({ text: ' ', size: 24, font: "Arial" })]
                        })
                    );
                    return;
                }

                const ehMarcadorRefrao = /^(\[?\s*(refr[aã]o|refrão|chorus|r\.?|bis|ponte)\s*:?\]?)$/i.test(linhaLimpa);
                if (ehMarcadorRefrao) emRefrao = true;

                paragraphs.push(
                    new Paragraph({
                        alignment: AlignmentType.JUSTIFIED,
                        spacing: { before: 0, after: 0, line: 240 },
                        children: [
                            new TextRun({ text: linhaLimpa, size: 24, font: "Arial", bold: emRefrao })
                        ]
                    })
                );
            });
        });

        const doc = new Document({
            sections: [{
                properties: {
                    page: {
                        size: { width: 11906, height: 16838 },
                        margin: { top: 720, bottom: 720, left: 720, right: 720 }
                    },
                    column: { count: 2, space: 720, separate: true },
                    type: SectionType.CONTINUOUS,
                },
                children: paragraphs,
            }]
        });

        try {
            const blob = await Packer.toBlob(doc);
            saveAs(blob, `${dataVal}-Letras-Sequencial.docx`);
        } catch (err) {
            console.error("Erro ao gerar DOCX:", err);
            alert("Erro ao gerar arquivo: " + err.message);
        }
    }

    // ── EXPORTAR LISTA COM LINKS (.docx) ─────────────────────────
    async function gerarListaLinks() {
        const dataVal = document.getElementById('data-selecionada').value;
        if (repertorioAtual.length === 0) return alert("Adicione cânticos ao repertório!");
        const displayData = document.getElementById('dia-semana-display').innerText;

        if (typeof docx === 'undefined') {
            return alert("Biblioteca docx.js não carregou. Verifique se os arquivos docx.min.js e FileSaver.min.js estão na mesma pasta do HTML.");
        }

        const { Document, Packer, Paragraph, TextRun,
                AlignmentType, BorderStyle, UnderlineType } = docx;

        const paragraphs = [];

        paragraphs.push(
            new Paragraph({
                alignment: AlignmentType.CENTER,
                border: { bottom: { style: BorderStyle.SINGLE, size: 12, color: "000000", space: 6 } },
                spacing: { before: 0, after: 200 },
                children: [
                    new TextRun({
                        text: `CÂNTICOS ${displayData.toUpperCase()}`,
                        bold: true, size: 28, font: "Arial",
                    })
                ]
            })
        );

        repertorioAtual.forEach((m, index) => {
            const link = (db[m.nome] && db[m.nome].link) ? db[m.nome].link.trim() : '';
            const numero = String(index + 1).padStart(2, '0');

            paragraphs.push(
                new Paragraph({
                    spacing: { before: 160, after: 40 },
                    children: [
                        new TextRun({
                            text: `${numero} ${m.nome.toUpperCase()}`,
                            bold: true, size: 26, font: "Arial",
                        })
                    ]
                }),
                new Paragraph({
                    spacing: { before: 0, after: 80 },
                    children: [
                        new TextRun({
                            text: link ? link : 'Sem link de áudio',
                            size: 22, font: "Arial",
                            color: link ? "1a0dab" : "999999",
                            italics: !link,
                            underline: link ? { type: UnderlineType.SINGLE, color: "1a0dab" } : undefined,
                        })
                    ]
                })
            );
        });

        const doc = new Document({
            sections: [{
                properties: {
                    page: {
                        size: { width: 11906, height: 16838 },
                        margin: { top: 1000, bottom: 1000, left: 1200, right: 1200 }
                    }
                },
                children: paragraphs,
            }]
        });

        try {
            const blob = await Packer.toBlob(doc);
            saveAs(blob, `${dataVal}-Lista-Canticos.docx`);
        } catch (err) {
            console.error("Erro ao gerar DOCX:", err);
            alert("Erro ao gerar arquivo: " + err.message);
        }
    }

    // ── BIBLIOTECA ────────────────────────────────────────────────
    function renderMenu(termo = '') {
        const lista = document.getElementById('lista-musicas');
        lista.innerHTML = '';
        Object.keys(db).sort().forEach(nome => {
            if (nome.toLowerCase().includes(termo.toLowerCase())) {
                const item = document.createElement('div');
                item.className = 'musica-item';
                item.innerHTML = `<span>${nome}</span><div><button onclick="event.stopPropagation(); deletar('${nome}')">✖</button></div>`;
                item.onclick = () => exibir(nome);
                lista.appendChild(item);
            }
        });
    }

    function editarCanticoAtual() {
        const nome = document.getElementById('titulo-musica').innerText;
        if (nome === "Inicie seu Repertório") return alert("Selecione um cântico primeiro!");
        if (!db[nome]) return alert("Cântico não encontrado na biblioteca!");
        abrirModal(true, nome);
    }

    function abrirModal(edit = false, id = '') {
        document.getElementById('modal-cadastro').style.display = 'flex';
        if (edit) {
            document.getElementById('edit-id').value = id;
            document.getElementById('novo-titulo').value = id;
            document.getElementById('novo-link').value = db[id].link || '';
            document.getElementById('novo-texto').value = db[id].texto;
        } else {
            document.getElementById('edit-id').value = '';
            document.getElementById('novo-titulo').value = '';
            document.getElementById('novo-link').value = '';
            document.getElementById('novo-texto').value = '';
        }
    }

    function fecharModal() { document.getElementById('modal-cadastro').style.display = 'none'; }

    function salvar() {
        const tit = document.getElementById('novo-titulo').value;
        const txt = document.getElementById('novo-texto').value;
        const link = document.getElementById('novo-link').value;
        const old = document.getElementById('edit-id').value;
        if (!tit || !txt) return alert("Preencha título e conteúdo!");
        if (old && old !== tit) delete db[old];
        db[tit] = { texto: txt, link: link };
        localStorage.setItem('cifras_v7', JSON.stringify(db));
        fecharModal();
        renderMenu();
        exibir(tit);
    }

    function deletar(n) {
        if (confirm(`Excluir ${n}?`)) {
            delete db[n];
            localStorage.setItem('cifras_v7', JSON.stringify(db));
            renderMenu();
        }
    }

    function transpor(s) {
        document.querySelectorAll('.acorde').forEach(el => {
            let nMatch = el.innerText.match(/[A-G][#b]?/);
            if (!nMatch) return;
            let n = nMatch[0], comp = el.innerText.replace(n, "");
            const mapa = {"Db":"C#","Eb":"D#","Gb":"F#","Ab":"G#","Bb":"A#"};
            if (mapa[n]) n = mapa[n];
            let idx = (escala.indexOf(n) + s) % 12;
            if (idx < 0) idx += 12;
            el.innerText = escala[idx] + comp;
        });
    }

    function filtrarMusicas() { renderMenu(document.getElementById('busca-input').value); }
    function limparBusca() { document.getElementById('busca-input').value = ''; renderMenu(); }

    renderMenu();

    function atualizarDestaquesCalendario() {
        const container = document.getElementById('lista-datas-destaque');
        const dataSelecionada = document.getElementById('data-selecionada').value;
        container.innerHTML = '';

        let mesFiltro, anoFiltro;
        if (dataSelecionada) {
            const partes = dataSelecionada.split('-');
            anoFiltro = partes[0];
            mesFiltro = partes[1];
        } else {
            const hoje = new Date();
            anoFiltro = hoje.getFullYear().toString();
            mesFiltro = (hoje.getMonth() + 1).toString().padStart(2, '0');
        }

        const datasFiltradas = Object.keys(agendas).filter(data => {
            const [ano, mes] = data.split('-');
            return agendas[data].length > 0 && ano === anoFiltro && mes === mesFiltro;
        });

        const nomesMeses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
        const legenda = document.querySelector('#container-datas-salvas small');
        if (legenda) legenda.innerText = `Repertórios de ${nomesMeses[parseInt(mesFiltro) - 1]}:`;

        if (datasFiltradas.length === 0) {
            container.innerHTML = '<small style="color: #7f8c8d; font-style: italic;">Nenhum neste mês.</small>';
            return;
        }

        datasFiltradas.sort().forEach(data => {
            const btn = document.createElement('button');
            btn.className = 'badge-data';
            const [ano, mes, dia] = data.split('-');
            btn.innerText = dia;
            btn.title = `Abrir repertório do dia ${dia}/${mes}/${ano}`;
            btn.onclick = () => {
                document.getElementById('data-selecionada').value = data;
                atualizarDataDisplay();
            };
            container.appendChild(btn);
        });
    }
</script>
